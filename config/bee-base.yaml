in-cluster: true

clusters:
  bee-base:
    _inherit: ""
    name: bee-base
    namespace: bee-base
    disable-namespace: true
    api-domain-internal: bee-base.svc.swarm1.local:1633
    api-insecure-tls: true
    api-scheme: http
    funding:
      eth: 0.1
      gbzz: 2.0
    node-groups:
      bee-base-1:
        mode: node
        bee-config: sepolia-base
        config: ng-bee-base
        count: 3
      bee-base-2:
        mode: node
        bee-config: sepolia-base
        config: ng-bee-base
        count: 3
      bee-base-3:
        mode: node
        bee-config: sepolia-base
        config: ng-bee-base
        count: 2
      bee-base-4:
        mode: node
        bee-config: sepolia-base
        config: ng-bee-base
        count: 2

# node-groups defines node groups that can be registered in the cluster
node-groups:
  ng-bee-base:
    _inherit: ""

# bee-configs defines Bee configuration that can be assigned to node-groups
bee-configs:
  sepolia-base:
    _inherit: ""
    full-node: true

checks:
  bb-pingpong:
    options:
    timeout: 30m
    type: pingpong
  bb-retrieval:
    options:
      chunks-per-node: 3
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
      upload-node-count: 3
    timeout: 15m
    type: retrieval
  bb-manifest:
    options:
      files-in-collection: 10
      max-pathname-length: 64
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
    timeout: 30m
    type: manifest
  bb-pss:
    options:
      count: 3
      address-prefix: 2
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
      request-timeout: 10m
    timeout: 30m
    type: pss
  bb-soc:
    options:
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
      request-timeout: 5m
    timeout: 15m
    type: soc
  bb-pushsync-chunks:
    options:
      chunks-per-node: 3
      mode: chunks
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
      retries: 5
      retry-delay: 15s
      upload-node-count: 3
      exclude-node-group:
        - light
        - bootnode
    timeout: 30m
    type: pushsync
  bb-gsoc:
    options:
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
    timeout: 10m
    type: gsoc
  bb-feed:
    options:
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
    timeout: 30m
    type: feed
  bb-redundancy:
    options:
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
      seed:
      data-size: 307200
    timeout: 30m
    type: redundancy
  bb-load:
    options:
      content-size: 50000000
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
      duration: 12h
      uploader-count: 2
      downloader-count: 0
      max-committed-depth: 2
      committed-depth-check-wait: 5m
      upload-groups:
        - bee-base-1
        - bee-base-2
      download-groups:
        - bee-base-3
        - bee-base-4
    timeout: 13h
    type: load
  bb-smoke:
    options:
      content-size: 50000000
      file-sizes: [5000000, 10000000, 20000000, 50000000] # 5mb, 10mb, 20mb, 50mb
      r-levels: [0, 1, 2, 3, 4] # NONE, MEDIUM, STRONG, INSANE, PARANOID
      postage-ttl: 336h
      postage-depth: 22
      postage-label: test-label
      duration: 12h
    timeout: 13h
    type: smoke
